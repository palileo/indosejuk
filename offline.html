<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d9488">
    <title>Offline - Indo Sejuk AC</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --accent: #0d9488;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: max(1.25rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1.25rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #ecfeff 0%, var(--bg) 48%, #f1f5f9 100%);
            color: var(--text);
        }

        .offline-card {
            width: min(100%, 460px);
            background: var(--card);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            text-align: center;
        }

        img {
            width: 72px;
            height: 72px;
            object-fit: contain;
        }

        h1 {
            margin: 1rem 0 0.5rem;
            font-size: 1.5rem;
        }

        p {
            margin: 0.35rem 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1.25rem;
        }

        button,
        a {
            min-height: 44px;
            padding: 0.75rem 1rem;
            border-radius: 14px;
            border: none;
            font: inherit;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        button {
            background: var(--accent);
            color: #fff;
        }

        a {
            background: #e2e8f0;
            color: var(--text);
        }
    </style>
</head>
<body>
    <main class="offline-card">
        <img src="image/logo.png" alt="Logo Indo Sejuk AC" width="72" height="72">
        <h1>Koneksi sedang offline</h1>
        <p>Shell dasar Indo Sejuk AC masih bisa dibuka, tetapi login, auth, OCR berbasis CDN, WhatsApp, dan data live Supabase tetap butuh internet.</p>
        <p>Silakan sambungkan kembali koneksi lalu muat ulang aplikasi.</p>
        <div class="actions">
            <button type="button" onclick="window.location.reload()">Coba Lagi</button>
            <a href="./index.html">Kembali ke Beranda</a>
        </div>
    </main>
</body>
</html>
