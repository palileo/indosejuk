name: Sync Profiles Snapshot

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - sync_profiles_snapshot

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull secure snapshot endpoint
        env:
          SNAPSHOT_PULL_URL: ${{ secrets.SNAPSHOT_PULL_URL }}
          SNAPSHOT_PULL_BEARER: ${{ secrets.SNAPSHOT_PULL_BEARER }}
          SNAPSHOT_OUTPUT_PATH: data/profiles-snapshot.json
        run: |
          if [ -z "$SNAPSHOT_PULL_URL" ]; then
            echo "SNAPSHOT_PULL_URL belum diisi. Workflow selesai tanpa perubahan."
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          url = os.environ["SNAPSHOT_PULL_URL"]
          bearer = os.environ.get("SNAPSHOT_PULL_BEARER", "")
          output_path = pathlib.Path(os.environ["SNAPSHOT_OUTPUT_PATH"])
          headers = {"Accept": "application/json"}
          if bearer:
              headers["Authorization"] = f"Bearer {bearer}"

          request = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(request, timeout=60) as response:
              payload = json.loads(response.read().decode("utf-8"))

          output_path.parent.mkdir(parents=True, exist_ok=True)
          output_path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          print(f"Snapshot ditulis ke {output_path}")
          PY

      - name: Commit snapshot if changed
        run: |
          if git diff --quiet -- data/profiles-snapshot.json; then
            echo "Tidak ada perubahan snapshot."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/profiles-snapshot.json
          git commit -m "chore: sync profiles snapshot"
          git push
